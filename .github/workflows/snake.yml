name: Update Profile README Assets

on:
  schedule:
    - cron: "0 0 * * *"    # runs once a day
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Ayyanarkanna
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake SVG to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  leetcode-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download LeetCode stats card as a static file
        run: |
          mkdir -p assets
          curl -sL "https://leetcard.jacoblin.cool/Ayyanarkanna?theme=dark&font=Baloo%202&ext=heatmap" -o assets/leetcode-stats.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/leetcode-stats.svg
          git diff --staged --quiet || git commit -m "chore: update leetcode stats card"
          git push
